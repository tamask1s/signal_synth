name: Python package

on:
  push:
    branches: [ master, main ]
    paths:
      - 'python/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'MANIFEST.in'
      - 'python/tests/fixtures/**'
      - 'scripts/build_python_distribution.sh'
      - 'scripts/smoke_python_distribution.sh'
      - '.github/workflows/python-package.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'MANIFEST.in'
      - 'python/tests/fixtures/**'
      - 'scripts/build_python_distribution.sh'
      - 'scripts/smoke_python_distribution.sh'
      - '.github/workflows/python-package.yml'
  workflow_dispatch:

jobs:
  build-and-smoke:
    name: Build and smoke test Python package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: python -m pip install build
      - name: Build distribution
        run: ./scripts/build_python_distribution.sh
      - name: Smoke installed wheel
        run: ./scripts/smoke_python_distribution.sh
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: synsigra-dist-py${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
