name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ctest:
    name: ${{ matrix.os }} / C++11
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure
        run: cmake -S teszt -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Run verification tests
        run: ctest --test-dir build -C Release --output-on-failure --output-log build/ctest-output.txt

      - name: Preserve verification log
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ctest-${{ matrix.os }}-${{ github.sha }}
          path: build/ctest-output.txt
          if-no-files-found: warn
          retention-days: 30
